# ─── Server ───────────────────────────────────────
server.port=${PORT:8080}

# ─── Database (Supabase PostgreSQL via Session Pooler) ──────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ─── Supabase admin API (required for invites) ─────
SUPABASE_URL=${SUPABASE_URL:}
SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:}
SUPABASE_INVITE_REDIRECT_TO=${SUPABASE_INVITE_REDIRECT_TO:http://localhost:3000/auth/confirm?next=/auth/set-password}

# ─── App role bootstrap ─────────────────────────────
app.bootstrap-admin-emails=${APP_BOOTSTRAP_ADMIN_EMAILS:almalimir@proton.me}

# ─── JPA / Hibernate ─────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ─── Jackson ──────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.property-naming-strategy=SNAKE_CASE
